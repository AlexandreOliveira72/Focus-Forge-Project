<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <!-- Responsividade -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="../../css/login.css"
    >

</head>

<body>

    <!-- NAVBAR -->
    <header class="topbar">

        <!-- Voltar para home -->
        <a
            href="../../index.html"
            class="home-link"
        >
            FocusForge
        </a>

    </header>



    <!-- CONTAINER -->
    <main class="container">

        <!-- CAIXA LOGIN -->
        <section class="login-box">



            <!-- LADO ESQUERDO -->
            <div class="login-image">

                <img
                    src="../../assets/images/lofi-girl-pixel.jpg"
                    alt="Imagem Login"
                >

                <!-- Overlay -->
                <div class="image-overlay">

                    <h2>
                        Build Focus.
                    </h2>

                    <p>
                        Organize sua rotina,
                        mantenha consistência
                        e evolua todos os dias.
                    </p>

                </div>

            </div>



            <!-- LADO DIREITO -->
            <div class="login-form">

                <form>

                    <!-- Título -->
                    <h2>
                        Login
                    </h2>



                    <!-- Input email -->
                    <input
                        type="email"
                        placeholder="Email"
                    >



                    <!-- Input senha -->
                    <input
                        type="password"
                        placeholder="Password"
                    >



                    <!-- Área dos botões -->
                    <div class="auth-actions">



                        <!-- Sign In -->
                        <div class="button-borders">

                            <button
                                type="submit"
                                class="primary-button"
                            >
                                Sign In
                            </button>

                        </div>



                        <!-- Register -->
                        <div class="button-borders">

                            <a
                                href="register.html"
                                class="primary-button"
                            >
                                Register
                            </a>

                        </div>

                    </div>

                </form>

            </div>

        </section>

    </main>

</body>

</html>
