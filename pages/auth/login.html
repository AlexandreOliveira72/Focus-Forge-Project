<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link
        rel="stylesheet"
        href="../../css/login.css"
    >
</head>

<body>

    <!-- =========================
    NAVBAR
    ========================== -->

    <header class="topbar">
        <nav class="navbar">

            <a
                href="../../index.html"
                class="logo"
            >
                FocusForge
            </a>

        </nav>
    </header>

    <!-- =========================
    CONTAINER
    ========================== -->

    <main class="container">

        <!-- LOGIN BOX -->
        <section class="login-box">

            <!-- LADO ESQUERDO -->
            <div class="login-image">

                <img
                    src="../../assets/images/lofi-girl-pixel.jpg"
                    alt="Imagem Login"
                >

                <div class="image-overlay">

                    <h2>Build Focus.</h2>

                    <p>
                        Organize sua rotina,
                        mantenha consistência
                        e evolua todos os dias.
                    </p>

                </div>

            </div>

            <!-- LADO DIREITO -->
            <div class="login-form">

                <form>

                    <!-- TÍTULO -->
                    <h2>Login</h2>

                    <!-- EMAIL -->
                    <input
                        type="email"
                        placeholder="Email"
                    >

                    <!-- PASSWORD -->
                    <input
                        type="password"
                        placeholder="Password"
                    >

                    <!-- FORGOT PASSWORD -->
                    <div class="forgot-password">

                        <a href="#">
                            Forgot password?
                        </a>

                    </div>

                    <!-- SIGN IN -->
                    <div class="auth-actions">

                        <div class="button-borders">

                            <button
                                type="submit"
                                class="primary-button"
                            >
                                Sign In
                            </button>

                        </div>

                    </div>

                    <!-- DIVIDER -->
                    <div class="divider">

                        <span>
                            Or continue with
                        </span>

                    </div>

                    <!-- GOOGLE BUTTON -->
                    <button
                        type="button"
                        class="google-button"
                    >
                        Continue with Google
                    </button>

                    <!-- REGISTER -->
                    <div class="register-text">

                        <p>
                            Don't have an account?
                            <a href="register.html">
                                Register here
                            </a>
                        </p>

                    </div>

                </form>

            </div>

        </section>

    </main>

</body>

</html>
