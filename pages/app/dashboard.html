<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <!-- Responsividade -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="/css/global.css"
    >

    <title>
        Dashboard
    </title>

</head>

<body>



    <!-- =========================
    TOPBAR
    ========================== -->

    <header class="topbar">

        <nav class="topbar-nav">



            <!-- LOGO -->
            <div class="nav-left">

                <a
                    href="#"
                    class="logo"
                >
                    FocusForge
                </a>

            </div>



            <!-- DIREITA -->
            <div class="nav-right">



                <!-- TASKS -->
                <button class="topbar-button">

                    <!-- ICON -->
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>

                    <span>
                        Tasks 3/5
                    </span>

                </button>



                <!-- STREAK -->
                <button class="topbar-button">

                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M12 2s4 4 4 8a4 4 0 1 1-8 0c0-4 4-8 4-8z"/>
                    </svg>

                    <span>
                        17 Days
                    </span>

                </button>



                <!-- NOTIFICAÇÃO -->
                <button class="icon-button">

                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
                        <path d="M10.3 21a2 2 0 0 0 3.4 0"/>
                    </svg>

                </button>



                <!-- NIGHT MODE -->
                <button class="icon-button">

                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>
                    </svg>

                </button>



                <!-- PERFIL -->
                <button class="profile-button">
                    <svg xmlns="http://www.w3.org/2000/svg" 
                    width="24" 
                    height="24" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    class="lucide lucide-smile-plus-icon lucide-smile-plus">
                    <path d="M22 11v1a10 10 0 1 1-9-10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" x2="9.01" y1="9" y2="9"/>
                    <line x1="15" x2="15.01" y1="9" y2="9"/>
                    <path d="M16 5h6"/><path d="M19 2v6"/>
                </svg>

                </button>

            </div>

        </nav>

    </header>



    <!-- =========================
    SIDEBAR
    ========================== -->

    <aside
        class="sidebar"
        id="sidebar"
    >



        <!-- EXPAND -->
        <button
            class="sidebar-button expand-button"
            onclick="toggleSidebar()"
        >

            <!-- ICON -->
            <svg xmlns="http://www.w3.org/2000/svg" 
            width="24" 
            height="24" 
            viewBox="0 0 24 24" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="2" 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            class="lucide lucide-list-indent-increase-icon lucide-list-indent-increase">
            <path d="M21 5H11"/>
            <path d="M21 12H11"/>
            <path d="M21 19H11"/>
            <path d="m3 8 4 4-4 4"/>
            </svg>

            <span>
                Expand
            </span>

        </button>



        <!-- DASHBOARD -->
        <button class="sidebar-button">

            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
            >
                <rect width="7" height="9" x="3" y="3"/>
                <rect width="7" height="5" x="14" y="3"/>
                <rect width="7" height="9" x="14" y="12"/>
                <rect width="7" height="5" x="3" y="16"/>
            </svg>

            <span>
                Dashboard
            </span>

        </button>



        <!-- HABIT TRACKER -->
        <button class="sidebar-button">

            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
            >
                <path d="M2 7l10-5 10 5-10 5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>

            <span>
                Habit Tracker
            </span>

        </button>



        <!-- TASKS -->
        <button class="sidebar-button">

            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
            >
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>

            <span>
                Tasks
            </span>

        </button>



        <!-- POMODORO -->
        <button class="sidebar-button">

            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
            >
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>

            <span>
                Pomodoro
            </span>

        </button>

        <!-- SETTINGS -->
        <button class="sidebar-button">

            <svg xmlns="http://www.w3.org/2000/svg" 
            width="24" 
            height="24" 
            viewBox="0 0 24 24" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="2" 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            class="lucide lucide-bolt-icon lucide-bolt">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <circle cx="12" cy="12" r="4"/>
            </svg>

            <span>
                Settings
            </span>

        </button>

    </aside>



    <!-- =========================
    CONTEÚDO
    ========================== -->

    <main class="dashboard-content">

        <h1>
            Welcome back!
        </h1>

    </main>



    <!-- =========================
    SCRIPT
    ========================== -->

    <script>

        function toggleSidebar(){

            const sidebar =
                document.getElementById("sidebar");

            sidebar.classList.toggle("expanded");
        }

    </script>

</body>

</html>
