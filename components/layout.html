<!-- =========================
TOPBAR
========================= -->

<header class="topbar">
    <nav class="topbar-nav">
        <div class="nav-left">
            <div class="topbar-spacer"></div>
        </div>

        <div class="nav-right">
            <!-- SEQUENCE DAYS -->
            <button class="topbar-button stat-button stat-fire" id="sequence-button">
                <img src="/assets/icons/fire.png" alt="Sequência de dias" class="topbar-icon">
                <span class="stat-value">17</span>
                <span class="stat-label">Days</span>
            </button>

            <!-- HOURS FOCUSED -->
            <button class="topbar-button stat-button stat-clock" id="focused-button">
                <img src="/assets/icons/focused.png" alt="Horas focadas hoje" class="topbar-icon">
                <span class="stat-value">3.4</span>
                <span class="stat-label">Hours</span>
            </button>

            <!-- TASKS COMPLETED -->
            <button class="topbar-button stat-button stat-check" id="tasks-button">
                <img src="/assets/icons/checked.png" alt="Tarefas concluídas" class="topbar-icon">
                <span class="stat-value">8</span>
                <span class="stat-label">Done</span>
            </button>

            <button
                class="icon-button"
                id="notification-button"
                onclick="toggleNotifications()"
            >
                <img
                    src="/assets/icons/bell.png"
                    alt="Notificações"
                    class="topbar-icon"
                >
            </button>

            <button
                class="icon-button"
                id="theme-button"
                onclick="toggleTheme()"
            >
                <img
                    src="/assets/icons/moon.png"
                    alt="Tema"
                    class="topbar-icon"
                >
            </button>
        </div>
    </nav>
</header>

<!-- =========================
SIDEBAR
========================= -->

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <a href="/pages/app/dashboard.html" class="sidebar-logo-link">

            src="/assets/icons/menu.png"
            alt="Expandir"

    <!-- DASHBOARD -->
    <a

            src="/assets/icons/dashboard.png"

    </a>

    <!-- POMODORO -->
    <a

        <img
            src="/assets/icons/pomodoro.png"

        >
        <span>Pomodoro</span>
    </a>

    <!-- TASKS -->
    <a
        href="/pages/app/tasks.html"
        class="sidebar-button"
    >
        <img
            src="/assets/icons/tasks.png"
            alt="Tasks"
            class="sidebar-icon"
        >
        <span>Tasks</span>
    </a>

    <!-- HABIT TRACKER -->
    <a
        href="/pages/app/habit.html"
        class="sidebar-button"
    >
        <img
            src="/assets/icons/habit.png"
            alt="Habit Tracker"
            class="sidebar-icon"
        >
        <span>Habit Tracker</span>
    </a>

    <!-- STATISTICS -->
    <a
        href="/pages/app/statistics.html"
        class="sidebar-button"
    >
        <img
            src="/assets/icons/statistics.png"
            alt="Statistics"
            class="sidebar-icon"
        >
        <span>Statistics</span>
    </a>

    <!-- SETTINGS -->
    <a
        href="/pages/app/settings.html"
        class="sidebar-button settings-button"
    >
        <img
            src="/assets/icons/user.png"
            alt="Configurações"
            class="sidebar-icon"
        >
        <span>Profile</span>
    </a>
</aside>
